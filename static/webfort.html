<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web Fortress</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="webfort.css" rel="stylesheet">
</head>

<body>
  <div id="game-container" class="col col-left hide-chat">
    <div class="status">
      <div id="user-count"> - <i class="fa fa-users"></i> </div>
      <div id="message"> Loading... </div>
      <div id="time-left"> -:-- <i class="fa fa-clock-o"> </i> </div>
    </div>
    <div class="canvas-container">
      <canvas id="myCanvas" width="1280" height="800"></canvas>
      <!-- Overlay canvas for ghost cursors from other players -->
      <canvas id="cursorCanvas" width="1280" height="800" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/stats.min.js"></script>
  <script src="js/keycode.js"></script>
  <script src="js/params.js"></script>
  <script src="js/webfort.js"></script>
</body>
</html>
